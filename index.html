<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>민규님 운동관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root {
  --bg:#0f0f0f; --surface:#1a1a1a; --surface2:#242424;
  --border:#2e2e2e; --text:#f0ede8; --muted:#6b6b6b;
  --accent:#e8533a; --accent2:#f0a500; --green:#4caf7d;
  --blue:#4a9eff; --purple:#9b7fe8;
  --font:'Noto Sans KR',sans-serif; --mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;}

.nav{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100;flex-wrap:wrap;gap:8px;}
.nav-logo{font-size:13px;font-weight:700;color:var(--accent);font-family:var(--mono);}
.nav-right{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.nav-tabs{display:flex;gap:2px;}
.nav-tab{padding:5px 11px;border-radius:6px;font-size:12px;cursor:pointer;border:none;background:none;color:var(--muted);font-family:var(--font);transition:all .15s;}
.nav-tab.active{background:var(--surface2);color:var(--text);}
.conn-wrap{display:flex;gap:5px;align-items:center;}
.conn-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);}
.conn-dot.on{background:var(--green);}
.conn-btn{padding:4px 9px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--font);}
.conn-btn.on{border-color:var(--green);color:var(--green);}

.page{display:none;padding:18px;max-width:800px;margin:0 auto;}
.page.active{display:block;}

.today-meta{font-size:11px;color:var(--muted);font-family:var(--mono);margin-bottom:3px;}
.today-title{font-size:24px;font-weight:900;margin-bottom:3px;}
.today-type{font-size:12px;color:var(--accent);font-family:var(--mono);margin-bottom:18px;}

.day-sel{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:18px;}
.day-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:none;color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;font-family:var(--font);}
.day-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.day-btn.has-rec{border-color:var(--green);color:var(--green);}

.prog-wrap{margin-bottom:16px;}
.prog-info{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px;font-family:var(--mono);}
.prog-bar{height:3px;background:var(--border);border-radius:2px;}
.prog-fill{height:100%;border-radius:2px;background:var(--green);transition:width .4s;}

.rh{border-radius:10px;padding:16px 18px;margin-bottom:12px;border:1px solid var(--border);}
.rh-lbl{font-size:10px;font-family:var(--mono);letter-spacing:.1em;margin-bottom:4px;opacity:.7;}
.rh-title{font-size:17px;font-weight:700;margin-bottom:6px;}
.rh-muscles{display:flex;gap:4px;flex-wrap:wrap;}
.mtag{font-size:10px;padding:2px 7px;border-radius:8px;background:rgba(255,255,255,.07);color:rgba(255,255,255,.5);}
.rh-a{border-color:#4a9eff44;background:linear-gradient(135deg,#4a9eff0d,transparent);}
.rh-b{border-color:#4caf7d44;background:linear-gradient(135deg,#4caf7d0d,transparent);}
.rh-c{border-color:#9b7fe844;background:linear-gradient(135deg,#9b7fe80d,transparent);}
.rh-d{border-color:#f0a50044;background:linear-gradient(135deg,#f0a5000d,transparent);}
.rh-e{border-color:#e8533a44;background:linear-gradient(135deg,#e8533a0d,transparent);}
.rh-f{border-color:#9b7fe844;background:linear-gradient(135deg,#9b7fe80d,transparent);}
.rh-rest{border-color:var(--border);background:var(--surface);}

.sec-lbl{font-size:10px;font-family:var(--mono);color:var(--muted);letter-spacing:.1em;margin:14px 0 5px 2px;}

/* 운동 카드 */
.ex-card{border:1px solid var(--border);border-radius:10px;margin-bottom:6px;background:var(--surface);overflow:hidden;transition:border-color .15s;}
.ex-card.done{border-color:var(--green);}
.ex-card-hdr{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;}
.ex-chk{width:19px;height:19px;border:1.5px solid var(--border);border-radius:4px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s;cursor:pointer;}
.ex-chk.done{background:var(--green);border-color:var(--green);}
.ex-chk.done::after{content:'✓';color:#fff;font-size:11px;font-weight:700;}
.ex-info{flex:1;cursor:pointer;}
.ex-name{font-size:13px;font-weight:500;margin-bottom:2px;}
.ex-detail{font-size:11px;color:var(--muted);margin-bottom:4px;font-family:var(--mono);}
.ex-tags{display:flex;gap:3px;flex-wrap:wrap;}
.etag{font-size:10px;padding:1px 5px;border-radius:5px;}
.t-main{background:#4a9eff1a;color:#4a9eff;}
.t-back{background:#f0a5001a;color:#f0a500;}
.t-knee{background:#e8533a1a;color:#e8533a;}
.t-sh{background:#9b7fe81a;color:#9b7fe8;}
.t-ok{background:#4caf7d1a;color:#4caf7d;}
.ex-arrow{font-size:11px;color:var(--muted);flex-shrink:0;margin-top:3px;transition:transform .2s;cursor:pointer;}
.ex-arrow.open{transform:rotate(180deg);}

/* 운동 액션 버튼들 */
.ex-actions{display:flex;gap:5px;margin-top:6px;}
.ex-action-btn{padding:3px 8px;border-radius:5px;border:1px solid var(--border);background:none;font-size:10px;cursor:pointer;font-family:var(--font);transition:all .15s;}
.ex-action-btn.info{color:var(--blue);border-color:#4a9eff44;}
.ex-action-btn.info:hover{background:#4a9eff1a;}
.ex-action-btn.yt{color:#ff4444;border-color:#ff444433;}
.ex-action-btn.yt:hover{background:#ff44441a;}
.ex-action-btn.edit{color:var(--muted);border-color:var(--border);}
.ex-action-btn.edit:hover{color:var(--text);border-color:var(--muted);}

/* 운동 설명 패널 */
.ex-desc-panel{padding:10px 14px;background:var(--surface2);border-top:1px solid var(--border);display:none;}
.ex-desc-panel.open{display:block;}
.ex-desc-title{font-size:11px;font-weight:700;color:var(--blue);margin-bottom:6px;}
.ex-desc-body{font-size:12px;color:var(--muted);line-height:1.8;}
.ex-desc-tip{font-size:11px;color:var(--accent);margin-top:6px;padding:6px 10px;background:#e8533a15;border-radius:6px;border-left:2px solid var(--accent);}

/* 세트 입력 */
.sets-area{padding:0 14px 12px;border-top:1px solid var(--border);display:none;}
.sets-area.open{display:block;}
.sets-hdr{display:grid;grid-template-columns:28px 1fr 1fr 32px;gap:6px;padding:8px 2px 4px;font-size:10px;color:var(--muted);font-family:var(--mono);text-align:center;}
.set-row{display:grid;grid-template-columns:28px 1fr 1fr 32px;gap:6px;align-items:center;margin-bottom:5px;}
.set-num{font-size:11px;font-family:var(--mono);color:var(--muted);text-align:center;}
.set-inp{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 4px;font-size:14px;color:var(--text);font-family:var(--mono);text-align:center;width:100%;}
.set-inp:focus{outline:none;border-color:var(--accent2);}
.set-inp.filled{border-color:#4caf7d55;color:var(--green);}
.set-ok{width:30px;height:30px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.set-ok.done{background:var(--green);border-color:var(--green);color:#fff;}
.add-set{width:100%;padding:6px;border-radius:6px;border:1px dashed var(--border);background:none;color:var(--muted);font-size:11px;cursor:pointer;margin-top:5px;font-family:var(--font);}

/* 운동 편집 모달 */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:700;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;}
.modal-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;}
.modal-field{margin-bottom:14px;}
.modal-label{font-size:11px;color:var(--muted);font-family:var(--mono);margin-bottom:5px;}
.modal-inp{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 13px;font-size:13px;color:var(--text);font-family:var(--font);}
.modal-inp:focus{outline:none;border-color:var(--accent);}
.modal-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 13px;font-size:13px;color:var(--text);font-family:var(--font);resize:none;height:80px;}
.modal-textarea:focus{outline:none;border-color:var(--accent);}
.modal-btns{display:flex;gap:8px;margin-top:18px;}
.modal-save{flex:1;padding:11px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);}
.modal-cancel{padding:11px 18px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--muted);font-size:14px;cursor:pointer;font-family:var(--font);}

/* 바텀바 */
.bottom-bar{margin-top:14px;}
.cond-row{display:flex;align-items:center;gap:5px;margin-bottom:8px;flex-wrap:wrap;}
.cond-lbl{font-size:11px;color:var(--muted);}
.cond-btn{padding:4px 9px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--muted);font-size:11px;cursor:pointer;font-family:var(--font);}
.cond-btn.active{background:var(--accent2);border-color:var(--accent2);color:#000;}
.memo-inp{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 13px;font-size:13px;color:var(--text);font-family:var(--font);resize:none;height:56px;margin-bottom:9px;}
.memo-inp:focus{outline:none;border-color:var(--muted);}
.save-btn{width:100%;padding:14px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all .15s;}
.save-btn:hover{opacity:.85;}
.save-btn:disabled{opacity:.4;cursor:not-allowed;}

/* 캘린더 */
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.cal-title{font-size:19px;font-weight:700;}
.cal-navs{display:flex;gap:5px;}
.cal-nav-btn{width:29px;height:29px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:13px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:18px;}
.cal-dlbl{text-align:center;font-size:10px;color:var(--muted);font-family:var(--mono);padding:4px 0;}
.cal-cell{aspect-ratio:1;border-radius:7px;border:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;min-height:46px;}
.cal-cell:hover{border-color:var(--muted);}
.cal-cell.today{border-color:var(--accent);}
.cal-cell.has-rec{background:#4caf7d12;border-color:var(--green);}
.cal-cell.rest-day{opacity:.3;}
.cal-cell.empty{background:transparent;border-color:transparent;cursor:default;}
.cal-date{font-size:12px;font-weight:500;}
.cal-type{font-size:9px;font-family:var(--mono);margin-top:1px;}
.cal-type.A{color:var(--blue);}.cal-type.B{color:var(--green);}
.cal-type.C{color:var(--purple);}.cal-type.D{color:var(--accent2);}
.cal-type.E{color:var(--accent);}.cal-type.F{color:var(--purple);}
.cal-dot{width:5px;height:5px;border-radius:50%;background:var(--green);margin-top:2px;}
.cal-detail{padding:13px 15px;border-radius:10px;border:1px solid var(--border);background:var(--surface);margin-top:5px;}

/* 기록 */
.log-item{display:flex;align-items:flex-start;gap:9px;padding:12px 13px;border-radius:8px;margin-bottom:5px;border:1px solid var(--border);background:var(--surface);}
.log-date{font-size:11px;font-family:var(--mono);color:var(--muted);min-width:72px;}
.log-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:5px;font-family:var(--mono);flex-shrink:0;}
.bA{background:#4a9eff1a;color:var(--blue);}.bB{background:#4caf7d1a;color:var(--green);}
.bC{background:#9b7fe81a;color:var(--purple);}.bD{background:#f0a5001a;color:var(--accent2);}
.bE{background:#e8533a1a;color:var(--accent);}.bF{background:#9b7fe81a;color:var(--purple);}
.log-info{flex:1;}
.log-name{font-size:13px;font-weight:500;}
.log-sub{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:2px;line-height:1.6;}
.log-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:3px;}

/* 통계 */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:18px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px;}
.stat-val{font-size:28px;font-weight:900;font-family:var(--mono);color:var(--accent);}
.stat-unit{font-size:11px;color:var(--muted);}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px;}
.w-card{padding:10px 13px;border-radius:8px;border:1px solid var(--border);background:var(--surface);margin-bottom:5px;}

.rest-card{border:1px solid var(--border);border-radius:12px;padding:36px;text-align:center;background:var(--surface);}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 18px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;max-width:90%;text-align:center;}
.toast.show{opacity:1;}
.toast.success{border-color:var(--green);color:var(--green);}
.toast.error{border-color:var(--accent);color:var(--accent);}
.toast.info{border-color:var(--blue);color:var(--blue);}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">HY · 운동관리</div>
  <div class="nav-right">
    <div class="conn-wrap">
      <div class="conn-dot" id="gcal-dot"></div>
      <div class="conn-dot" id="gs-dot"></div>
      <button class="conn-btn" id="conn-btn" onclick="handleAuth()">구글 연결</button>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showPage('today')">오늘</button>
      <button class="nav-tab" onclick="showPage('calendar')">캘린더</button>
      <button class="nav-tab" onclick="showPage('log')">기록</button>
      <button class="nav-tab" onclick="showPage('stats')">통계</button>
    </div>
  </div>
</nav>

<!-- 오늘 -->
<div class="page active" id="page-today">
  <div class="today-meta" id="today-meta"></div>
  <div class="today-title" id="today-title">오늘의 루틴</div>
  <div class="today-type" id="today-type"></div>
  <div class="day-sel" id="day-sel"></div>
  <div class="prog-wrap">
    <div class="prog-info">
      <span id="prog-txt">0 / 0 완료</span>
      <button style="background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;" onclick="resetAll()">초기화</button>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div id="routine-content"></div>
  <div class="bottom-bar" id="bottom-bar" style="display:none;">
    <div class="cond-row">
      <span class="cond-lbl">컨디션</span>
      <button class="cond-btn" onclick="setCond(1)">⭐</button>
      <button class="cond-btn" onclick="setCond(2)">⭐⭐</button>
      <button class="cond-btn active" onclick="setCond(3)">⭐⭐⭐</button>
      <button class="cond-btn" onclick="setCond(4)">⭐⭐⭐⭐</button>
      <button class="cond-btn" onclick="setCond(5)">⭐⭐⭐⭐⭐</button>
    </div>
    <textarea class="memo-inp" id="memo-inp" placeholder="메모 (통증 부위, 특이사항...)"></textarea>
    <button class="save-btn" id="save-btn" onclick="saveRecord()">💾 저장</button>
  </div>
</div>

<!-- 캘린더 -->
<div class="page" id="page-calendar">
  <div class="cal-hdr">
    <div class="cal-title" id="cal-title"></div>
    <div class="cal-navs">
      <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
      <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
    </div>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
  <div id="cal-detail"></div>
</div>

<!-- 기록 -->
<div class="page" id="page-log">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
    <div style="font-size:17px;font-weight:700;">운동 기록</div>
    <span style="font-size:11px;color:var(--muted);font-family:var(--mono);" id="log-count"></span>
  </div>
  <div id="log-list"></div>
</div>

<!-- 통계 -->
<div class="page" id="page-stats">
  <div style="margin-bottom:16px;">
    <div style="font-size:11px;color:var(--muted);font-family:var(--mono);margin-bottom:3px;">OVERVIEW</div>
    <div style="font-size:21px;font-weight:900;">운동 통계</div>
  </div>
  <div class="stats-grid" id="stats-grid"></div>
  <div style="margin-bottom:10px;font-size:13px;font-weight:700;">루틴별 횟수</div>
  <div id="type-stats"></div>
  <div style="margin:20px 0 10px;font-size:13px;font-weight:700;">💪 중량 성장 추이</div>
  <div id="weight-history"></div>
</div>

<!-- 운동 편집 모달 -->
<div class="modal-bg" id="edit-modal">
  <div class="modal">
    <div class="modal-title">
      <span>운동 수정</span>
      <button class="modal-close" onclick="closeEditModal()">✕</button>
    </div>
    <div class="modal-field">
      <div class="modal-label">운동 이름</div>
      <input class="modal-inp" id="edit-name" type="text" placeholder="운동 이름"/>
    </div>
    <div class="modal-field">
      <div class="modal-label">세트 × 횟수 (예: 3세트 × 12회)</div>
      <input class="modal-inp" id="edit-detail" type="text" placeholder="3세트 × 12회"/>
    </div>
    <div class="modal-field">
      <div class="modal-label">기본 세트 수 (중량 입력 칸 수)</div>
      <input class="modal-inp" id="edit-sets" type="number" min="0" max="10" placeholder="0 = 세트 입력 없음"/>
    </div>
    <div class="modal-field">
      <div class="modal-label">운동 설명</div>
      <textarea class="modal-textarea" id="edit-desc" placeholder="운동 방법 설명..."></textarea>
    </div>
    <div class="modal-field">
      <div class="modal-label">주의사항 (허리주의 / 무릎주의 / 어깨주의)</div>
      <input class="modal-inp" id="edit-warn" type="text" placeholder="허리주의, 어깨주의"/>
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeEditModal()">취소</button>
      <button class="modal-save" onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════
// 구글 연동
// ═══════════════════════════════
const CLIENT_ID = '512897160383-7dn4ti8i5q8m4aj3eh0j1b53pvm680un.apps.googleusercontent.com';
const SHEET_ID  = '1YvdOYURrgUGNC8C8yJOUoHfiX-94he55Aeqmp4ML_Qk';
const SCOPES = 'https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/spreadsheets';
let tokenClient=null, accessToken=null, isConn=false;

function initGoogle() {
  try {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID, scope: SCOPES,
      callback: async (r) => {
        if(r.error){ showToast('구글 로그인 실패','error'); return; }
        accessToken=r.access_token; isConn=true;
        updateConnUI(true);
        showToast('✅ 구글 연결 완료!','success');
        document.getElementById('save-btn').textContent='💾 저장 + 📅 캘린더 + 📊 시트';
        await ensureHeader();
      }
    });
  } catch(e){}
}
function handleAuth() {
  if(isConn){ accessToken=null; isConn=false; updateConnUI(false); showToast('연결 해제','info'); document.getElementById('save-btn').textContent='💾 저장'; return; }
  if(!tokenClient){ showToast('잠시 후 다시 시도','info'); return; }
  tokenClient.requestAccessToken();
}
function updateConnUI(on) {
  ['gcal','gs'].forEach(id=>{ document.getElementById(id+'-dot').className='conn-dot'+(on?' on':''); });
  const btn=document.getElementById('conn-btn');
  btn.textContent=on?'연결해제':'구글 연결';
  btn.className='conn-btn'+(on?' on':'');
}
async function ensureHeader() {
  if(!isConn) return;
  try {
    const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/운동기록!A1`,{headers:{'Authorization':'Bearer '+accessToken}});
    const d=await r.json();
    if(!d.values){ await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/운동기록!A1:N1?valueInputOption=RAW`,{method:'PUT',headers:{'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify({values:[['날짜','요일','루틴','루틴명','완료수','전체수','컨디션','메모','운동명','세트','중량kg','횟수','Phase','저장시간']]})}); }
  } catch(e){}
}
async function addToGcal(rec,rt) {
  if(!isConn) return null;
  try {
    const desc=`💪 ${rt.title}\n✅ ${rec.exDone}/${rec.exTotal} 완료\n${'⭐'.repeat(rec.cond||3)}${rec.memo?'\n📝 '+rec.memo:''}`;
    const cm={A:'9',B:'10',C:'6',D:'5',E:'11',F:'6'};
    const ev={summary:`💪 [${rec.type}] ${rt.title}`,description:desc,start:{dateTime:rec.date+'T07:00:00',timeZone:'Asia/Seoul'},end:{dateTime:rec.date+'T08:00:00',timeZone:'Asia/Seoul'},colorId:cm[rec.type]||'9'};
    const r=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events',{method:'POST',headers:{'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify(ev)});
    if(!r.ok) return null;
    return (await r.json()).id;
  } catch(e){ return null; }
}
async function saveToSheet(rec,rt) {
  if(!isConn) return false;
  try {
    const dk=['일','월','화','수','목','금','토'];
    const dow=new Date(rec.date+'T12:00:00').getDay();
    const rows=rec.sets&&rec.sets.length?rec.sets.map(s=>[rec.date,dk[dow],rec.type,rt.title,rec.exDone,rec.exTotal,'⭐'.repeat(rec.cond||3),rec.memo||'',s.ex,s.set,s.weight||'',s.reps||'','phase2',new Date().toLocaleString('ko-KR')])
      :[[rec.date,dk[dow],rec.type,rt.title,rec.exDone,rec.exTotal,'⭐'.repeat(rec.cond||3),rec.memo||'','','','','','phase2',new Date().toLocaleString('ko-KR')]];
    const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/운동기록!A:N:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`,{method:'POST',headers:{'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify({values:rows})});
    return r.ok;
  } catch(e){ return false; }
}

function loadRecs(){ try{records=JSON.parse(localStorage.getItem(SK)||'[]');}catch{records=[];} }
function saveRecs(){ try{localStorage.setItem(SK,JSON.stringify(records));}catch{} }
function loadRT(){
  try{
    const saved=JSON.parse(localStorage.getItem(RT_SK)||'null');
    RT=saved||JSON.parse(JSON.stringify(RT_DEFAULT));
  }catch{ RT=JSON.parse(JSON.stringify(RT_DEFAULT)); }
}
function saveRT(){ try{localStorage.setItem(RT_SK,JSON.stringify(RT));}catch{} }

function getDateForDow(dow){
  const today=new Date(), todayDow=today.getDay(), diff=dow-todayDow;
  const d=new Date(today); d.setDate(today.getDate()+diff);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function todayStr(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// 세트 관리
// ═══════════════════════════════
function exKey(si,ei){ return `${selDay}-${si}-${ei}`; }
function initSetData(tk){
  setData={};
  const rt=RT[tk]; if(!rt||!rt.sections) return;
  rt.sections.forEach((sec,si)=>sec.exs.forEach((ex,ei)=>{
    if(ex.sets>0){ const k=exKey(si,ei); setData[k]=Array.from({length:ex.sets},()=>({weight:'',reps:'',done:false})); }
  }));
}
function renderSets(key,cId){
  const sets=setData[key]; if(!sets) return;
  const c=document.getElementById(cId); if(!c) return;
  c.innerHTML=`<div class="sets-hdr"><div>세트</div><div>중량 kg</div><div>횟수</div><div>✓</div></div>
    ${sets.map((s,i)=>`<div class="set-row" id="sr-${key}-${i}">
      <div class="set-num">${i+1}</div>
      <input class="set-inp ${s.weight?'filled':''}" type="number" value="${s.weight}" placeholder="0" min="0" step="0.5" oninput="updSet('${key}',${i},'weight',this.value)"/>
      <input class="set-inp ${s.reps?'filled':''}" type="number" value="${s.reps}" placeholder="0" min="0" oninput="updSet('${key}',${i},'reps',this.value)"/>
      <button class="set-ok ${s.done?'done':''}" onclick="toggleSetDone('${key}',${i})">✓</button>
    </div>`).join('')}
    <button class="add-set" onclick="addSet('${key}','${cId}')">+ 세트 추가</button>`;
}
function updSet(k,i,f,v){ if(!setData[k]) return; setData[k][i][f]=v; }
function toggleSetDone(k,i){
  if(!setData[k]) return;
  setData[k][i].done=!setData[k][i].done;
  const btn=document.querySelector(`#sr-${k}-${i} .set-ok`);
  if(btn) btn.classList.toggle('done',setData[k][i].done);
  const parts=k.split('-');
  const allDone=setData[k].every(s=>s.done);
  const card=document.getElementById(`ec-${parts[1]}-${parts[2]}`);
  const chk=document.getElementById(`echk-${parts[1]}-${parts[2]}`);
  if(card) card.classList.toggle('done',allDone);
  if(chk) chk.classList.toggle('done',allDone);
  updateProg();
}
function addSet(k,cId){
  if(!setData[k]) setData[k]=[];
  setData[k].push({weight:'',reps:'',done:false});
  renderSets(k,cId);
}

function initToday(){
  const now=new Date(), todayDow=now.getDay(), ds=todayStr();
  // 항상 오늘 날짜 표시
  document.getElementById('today-meta').textContent='오늘: '+ds+' ('+DAY_KR[todayDow]+')';
  const sel=document.getElementById('day-sel'); sel.innerHTML='';
  DAY_KR.forEach((n,i)=>{
    const btn=document.createElement('button');
    const wds=getDateForDow(i);
    btn.className='day-btn'+(i===selDay?' active':'')+(records.find(r=>r.date===wds)?' has-rec':'');
    btn.textContent=n;
    btn.onclick=()=>{selDay=i;initSetData(DAY_SCHED[i]);renderRoutine();initToday();};
    sel.appendChild(btn);
  });
  renderRoutine();
}

function renderRoutine(){
  const tk=DAY_SCHED[selDay], rt=RT[tk];
  const dayNames=['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
  const ds=getDateForDow(selDay);
  document.getElementById('today-title').textContent=rt.title;
  document.getElementById('today-type').textContent=tk==='REST'?'휴식일':`Type ${tk} · ${dayNames[selDay]} · ${ds}`;
  const content=document.getElementById('routine-content');
  const bottom=document.getElementById('bottom-bar');
  if(tk==='REST'){
    content.innerHTML=`<div class="rest-card"><div style="font-size:34px;margin-bottom:10px;">😴</div><div style="font-size:17px;font-weight:700;margin-bottom:7px;">오늘은 휴식일!</div><div style="font-size:13px;color:var(--muted);line-height:1.9;">근육은 쉴 때 성장합니다<br>가벼운 산책 20분 OK<br>단백질 식사 꼭 챙기기</div></div>`;
    bottom.style.display='none';
    document.getElementById('prog-txt').textContent='휴식일';
    document.getElementById('prog-fill').style.width='0%';
    return;
  }
  bottom.style.display='block';
  let html=`<div class="rh ${rt.color}"><div class="rh-lbl">${rt.label}</div><div class="rh-title">${rt.title}</div><div class="rh-muscles">${rt.muscles.map(m=>`<span class="mtag">${m}</span>`).join('')}</div></div>`;
  rt.sections.forEach((sec,si)=>{
    html+=`<div class="sec-lbl">${sec.n}</div>`;
    sec.exs.forEach((ex,ei)=>{
      const wTags=ex.w.map(w=>{
        if(w.includes('허리')) return `<span class="etag t-back">${w}</span>`;
        if(w.includes('무릎')) return `<span class="etag t-knee">${w}</span>`;
        if(w.includes('어깨')) return `<span class="etag t-sh">${w}</span>`;
        return `<span class="etag">${w}</span>`;
      }).join('');
      const mTags=ex.tags.map(t=>`<span class="etag t-main">${t}</span>`).join('');
      const k=exKey(si,ei), hasSets=ex.sets>0;
      const saId=`sa-${si}-${ei}`, descId=`desc-${si}-${ei}`;
      const info=EX_INFO[ex.n];
      html+=`<div class="ex-card" id="ec-${si}-${ei}">
        <div class="ex-card-hdr">
          <div class="ex-chk" id="echk-${si}-${ei}" onclick="toggleExChk('${si}','${ei}')"></div>
          <div class="ex-info" onclick="${hasSets?`toggleCard('${si}','${ei}','${k}','${saId}',true)`:''}">
            <div class="ex-name">${ex.n}</div>
            <div class="ex-detail">${ex.d}</div>
            <div class="ex-tags">${mTags}${wTags}</div>
            <div class="ex-actions">
              ${info?`<button class="ex-action-btn info" onclick="event.stopPropagation();toggleDesc('${descId}')">📖 설명보기</button>`:''}
              ${info?`<button class="ex-action-btn yt" onclick="event.stopPropagation();openYT('${(info.yt||ex.n).replace(/'/g,"\\'")}')">▶ 유튜브</button>`:''}
              <button class="ex-action-btn edit" onclick="event.stopPropagation();openEdit('${tk}',${si},${ei})">✏️ 수정</button>
            </div>
          </div>
          ${hasSets?`<div class="ex-arrow" id="arr-${si}-${ei}" onclick="toggleCard('${si}','${ei}','${k}','${saId}',true)">▼</div>`:''}
        </div>
        ${info?`<div class="ex-desc-panel" id="${descId}"><div class="ex-desc-title">📋 운동 방법</div><div class="ex-desc-body">${info.desc}</div><div class="ex-desc-tip">⚠️ ${info.tip}</div></div>`:''}
        ${hasSets?`<div class="sets-area" id="${saId}"></div>`:''}
      </div>`;
    });
  });
  content.innerHTML=html;
  rt.sections.forEach((sec,si)=>sec.exs.forEach((ex,ei)=>{
    if(ex.sets>0){ const k=exKey(si,ei); if(!setData[k]) setData[k]=Array.from({length:ex.sets},()=>({weight:'',reps:'',done:false})); }
  }));
  updateProg();
}

function toggleDesc(id){
  const el=document.getElementById(id); if(!el) return;
  el.classList.toggle('open');
}
function openYT(query){
  const url='https://www.youtube.com/results?search_query='+encodeURIComponent(query);
  window.open(url,'_blank');
}
function toggleCard(si,ei,k,saId,hasSets){
  if(!hasSets) return;
  const area=document.getElementById(saId), arr=document.getElementById(`arr-${si}-${ei}`);
  if(!area) return;
  const isOpen=area.classList.contains('open');
  area.classList.toggle('open',!isOpen);
  if(arr) arr.classList.toggle('open',!isOpen);
  if(!isOpen) renderSets(k,saId);
}
function toggleExChk(si,ei){
  const chk=document.getElementById(`echk-${si}-${ei}`), card=document.getElementById(`ec-${si}-${ei}`);
  chk.classList.toggle('done'); card.classList.toggle('done'); updateProg();
}
function updateProg(){
  const all=document.querySelectorAll('.ex-chk').length, done=document.querySelectorAll('.ex-chk.done').length;
  document.getElementById('prog-txt').textContent=`${done} / ${all} 완료`;
  document.getElementById('prog-fill').style.width=(all?Math.round(done/all*100):0)+'%';
}
function resetAll(){
  document.querySelectorAll('.ex-chk').forEach(e=>e.classList.remove('done'));
  document.querySelectorAll('.ex-card').forEach(e=>e.classList.remove('done'));
  document.querySelectorAll('.set-ok').forEach(e=>e.classList.remove('done'));
  document.querySelectorAll('.set-inp').forEach(e=>{e.value='';e.classList.remove('filled');});
  initSetData(DAY_SCHED[selDay]); updateProg();
}
function setCond(v){ selCond=v; document.querySelectorAll('.cond-btn').forEach((b,i)=>b.classList.toggle('active',i+1===v)); }

// ═══════════════════════════════
// 운동 편집 모달
// ═══════════════════════════════
function openEdit(tk,si,ei){
  editTarget={tk,si,ei};
  const ex=RT[tk].sections[si].exs[ei];
  document.getElementById('edit-name').value=ex.n||'';
  document.getElementById('edit-detail').value=ex.d||'';
  document.getElementById('edit-sets').value=ex.sets||0;
  document.getElementById('edit-desc').value=(EX_INFO[ex.n]&&EX_INFO[ex.n].desc)||'';
  document.getElementById('edit-warn').value=(ex.w||[]).join(', ');
  document.getElementById('edit-modal').classList.add('open');
}
function closeEditModal(){ document.getElementById('edit-modal').classList.remove('open'); editTarget=null; }
function saveEdit(){
  if(!editTarget) return;
  const {tk,si,ei}=editTarget;
  const ex=RT[tk].sections[si].exs[ei];
  ex.n=document.getElementById('edit-name').value.trim()||ex.n;
  ex.d=document.getElementById('edit-detail').value.trim()||ex.d;
  ex.sets=parseInt(document.getElementById('edit-sets').value)||0;
  ex.w=document.getElementById('edit-warn').value.split(',').map(s=>s.trim()).filter(Boolean);
  const descVal=document.getElementById('edit-desc').value.trim();
  if(descVal) EX_INFO[ex.n]={...(EX_INFO[ex.n]||{}),desc:descVal};
  saveRT();
  closeEditModal();
  initSetData(tk);
  renderRoutine();
  showToast('✅ 운동 수정 완료!','success');
}

// ═══════════════════════════════
// 저장
// ═══════════════════════════════
async function saveRecord(){
  const tk=DAY_SCHED[selDay]; if(tk==='REST') return;
  const ds=getDateForDow(selDay);
  const allSets=[];
  Object.entries(setData).forEach(([k,sets])=>{
    const parts=k.split('-'), si=parseInt(parts[1]), ei=parseInt(parts[2]);
    const rt=RT[tk]; if(!rt||!rt.sections[si]||!rt.sections[si].exs[ei]) return;
    const exName=rt.sections[si].exs[ei].n;
    sets.forEach((s,idx)=>{ if(s.weight||s.reps) allSets.push({ex:exName,set:idx+1,weight:s.weight,reps:s.reps,done:s.done}); });
  });
  const exDone=document.querySelectorAll('.ex-chk.done').length;
  const exTotal=document.querySelectorAll('.ex-chk').length;
  const memo=document.getElementById('memo-inp').value;
  const rec={id:Date.now(),date:ds,type:tk,exDone,exTotal,sets:allSets,cond:selCond,memo,phase:'phase2',gcalId:null,sheetSaved:false};
  const btn=document.getElementById('save-btn'); btn.disabled=true; btn.textContent='저장 중...';
  if(isConn){
    showToast('📅 구글 연동 중...','info');
    const gid=await addToGcal(rec,RT[tk]); if(gid) rec.gcalId=gid;
    const ok=await saveToSheet(rec,RT[tk]); rec.sheetSaved=ok;
    showToast(ok?'✅ 저장 완료! 캘린더+시트 기록됨':'⚠️ 저장 완료 (시트 실패)',ok?'success':'error');
  } else { showToast('💾 저장 완료!','success'); }
  records=records.filter(r=>r.date!==ds); records.unshift(rec); saveRecs();
  btn.disabled=false; btn.textContent=isConn?'💾 저장 + 📅 캘린더 + 📊 시트':'💾 저장';
  document.getElementById('memo-inp').value='';
  initToday(); renderLog(); renderStats();
}

// ═══════════════════════════════
// 캘린더
// ═══════════════════════════════
function renderCalendar(){
  const mN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('cal-title').textContent=`${calYear}년 ${mN[calMonth]}`;
  const ts=todayStr(), firstDow=new Date(calYear,calMonth,1).getDay(), dim=new Date(calYear,calMonth+1,0).getDate();
  let html=DAY_KR.map(d=>`<div class="cal-dlbl">${d}</div>`).join('');
  for(let i=0;i<firstDow;i++) html+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=dim;d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow=new Date(calYear,calMonth,d).getDay(), tk=DAY_SCHED[dow], rec=records.find(r=>r.date===ds);
    const isToday=ds===ts, isRest=tk==='REST';
    html+=`<div class="cal-cell${isToday?' today':''}${rec?' has-rec':''}${isRest&&!rec?' rest-day':''}" onclick="showCalDetail('${ds}')">
      <div class="cal-date">${d}</div>
      <div class="cal-type ${isRest?'':tk}">${isRest?'휴':tk}</div>
      ${rec?'<div class="cal-dot"></div>':''}
    </div>`;
  }
  document.getElementById('cal-grid').innerHTML=html;
  document.getElementById('cal-detail').innerHTML='';
}
function changeMonth(dir){ calMonth+=dir; if(calMonth<0){calMonth=11;calYear--;} if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); }
function showCalDetail(ds){
  const rec=records.find(r=>r.date===ds);
  const dow=new Date(ds+'T12:00:00').getDay(), tk=DAY_SCHED[dow];
  const detail=document.getElementById('cal-detail');
  if(!rec){ detail.innerHTML=`<div class="cal-detail" style="color:var(--muted);font-size:13px;">${ds} (${DAY_KR[dow]}) — ${tk==='REST'?'휴식일':'기록 없음'}</div>`; return; }
  const sHtml=rec.sets&&rec.sets.length?rec.sets.map(s=>`<div style="display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:1px solid var(--border);font-family:var(--mono);"><span>${s.ex.slice(0,12)}</span><span>세트${s.set}: ${s.weight||'?'}kg×${s.reps||'?'}</span></div>`).join(''):'';
  detail.innerHTML=`<div class="cal-detail">
    <div style="font-size:11px;font-family:var(--mono);color:var(--muted);margin-bottom:7px;">${ds} (${DAY_KR[dow]})</div>
    <div style="display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-bottom:8px;">
      <span class="log-badge b${rec.type}">Type ${rec.type}</span>
      <span>${'⭐'.repeat(rec.cond||3)}</span>
      <span style="font-size:12px;color:var(--muted);font-family:var(--mono);">${rec.exDone}/${rec.exTotal}완료</span>
      ${rec.gcalId?'<span style="font-size:10px;color:var(--blue);">📅</span>':''}${rec.sheetSaved?'<span style="font-size:10px;color:var(--green);">📊</span>':''}
    </div>
    ${sHtml?`<div style="margin-top:8px;">${sHtml}</div>`:''}
    ${rec.memo?`<div style="font-size:12px;color:var(--muted);margin-top:8px;">📝 ${rec.memo}</div>`:''}
  </div>`;
}

// ═══════════════════════════════
// 기록
// ═══════════════════════════════
function renderLog(){
  document.getElementById('log-count').textContent=`총 ${records.length}회`;
  const list=document.getElementById('log-list');
  if(!records.length){ list.innerHTML=`<div style="text-align:center;padding:40px;color:var(--muted);font-size:13px;">아직 기록이 없어요. 오늘 운동 후 저장해보세요! 💪</div>`; return; }
  list.innerHTML=records.map(rec=>{
    const sp=rec.sets&&rec.sets.length?rec.sets.slice(0,3).map(s=>`${s.ex.slice(0,5)} ${s.set}세트:${s.weight||'?'}kg`).join(' / '):'';
    return `<div class="log-item">
      <div class="log-date">${rec.date}</div>
      <span class="log-badge b${rec.type}">Type ${rec.type}</span>
      <div class="log-info">
        <div class="log-name">${RT[rec.type]?.title||rec.type}</div>
        <div class="log-sub">${rec.exDone}/${rec.exTotal}완료 · ${'⭐'.repeat(rec.cond||3)}${rec.memo?' · '+rec.memo:''}</div>
        ${sp?`<div class="log-sub">⚖️ ${sp}</div>`:''}
      </div>
      <button class="log-del" onclick="delRec(${rec.id})">✕</button>
    </div>`;
  }).join('');
}
function delRec(id){ if(!confirm('삭제할까요?')) return; records=records.filter(r=>r.id!==id); saveRecs(); renderLog(); renderCalendar(); renderStats(); showToast('삭제 완료','info'); }

// ═══════════════════════════════
// 통계
// ═══════════════════════════════
function renderStats(){
  const total=records.length, ym=new Date().toISOString().slice(0,7);
  const thisMonth=records.filter(r=>r.date.startsWith(ym)).length;
  let streak=0; const today=new Date();
  for(let i=0;i<60;i++){ const d=new Date(today); d.setDate(today.getDate()-i); const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; if(records.find(r=>r.date===ds)) streak++; else if(i>0) break; }
  const avg=records.length?(records.reduce((s,r)=>s+(r.cond||3),0)/records.length).toFixed(1):'-';
  document.getElementById('stats-grid').innerHTML=`
    <div class="stat-card"><div class="stat-val">${total}</div><div class="stat-unit">회</div><div class="stat-label">총 누적</div></div>
    <div class="stat-card"><div class="stat-val">${thisMonth}</div><div class="stat-unit">회</div><div class="stat-label">이번 달</div></div>
    <div class="stat-card"><div class="stat-val">${streak}</div><div class="stat-unit">일</div><div class="stat-label">연속 출석</div></div>
    <div class="stat-card"><div class="stat-val">${avg}</div><div class="stat-unit">/ 5</div><div class="stat-label">평균 컨디션</div></div>`;
  const tc={};records.forEach(r=>{tc[r.type]=(tc[r.type]||0)+1;});
  const tL={A:'월(가슴·어깨)',B:'화(등·이두)',C:'수(하체·둔근)',D:'목(유산소·척추)',E:'금(복근·전신)',F:'토(하체경량)'};
  const tC={A:'var(--blue)',B:'var(--green)',C:'var(--purple)',D:'var(--accent2)',E:'var(--accent)',F:'var(--purple)'};
  const maxC=Math.max(...Object.values(tc),1);
  document.getElementById('type-stats').innerHTML=Object.entries(tL).map(([t,lb])=>{
    const cnt=tc[t]||0;
    return `<div style="margin-bottom:9px;"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;"><span style="color:${tC[t]};">${lb}</span><span style="font-family:var(--mono);color:var(--muted);">${cnt}회</span></div><div style="height:5px;background:var(--border);border-radius:3px;"><div style="height:100%;width:${Math.round(cnt/maxC*100)}%;background:${tC[t]};border-radius:3px;transition:width .5s;"></div></div></div>`;
  }).join('');
  const wMap={};
  records.forEach(rec=>{ if(!rec.sets) return; rec.sets.forEach(s=>{ if(!s.weight) return; if(!wMap[s.ex]) wMap[s.ex]=[]; wMap[s.ex].push({date:rec.date,weight:parseFloat(s.weight),reps:s.reps}); }); });
  const topExs=Object.entries(wMap).sort((a,b)=>b[1].length-a[1].length).slice(0,6);
  document.getElementById('weight-history').innerHTML=topExs.length?topExs.map(([ex,arr])=>{
    const sorted=arr.sort((a,b)=>a.date.localeCompare(b.date)), latest=sorted[sorted.length-1], first=sorted[0];
    const diff=+(latest.weight-first.weight).toFixed(1), dc=diff>0?'var(--green)':diff<0?'var(--accent)':'var(--muted)';
    return `<div class="w-card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;"><span style="font-size:12px;font-weight:500;">${ex}</span><span style="font-size:11px;font-family:var(--mono);color:${dc};">${diff>0?'+':''}${diff}kg${diff>0?'↑':diff<0?'↓':''}</span></div><div style="font-size:11px;color:var(--muted);font-family:var(--mono);">최근 ${latest.weight}kg × ${latest.reps||'?'}회 · ${latest.date}</div></div>`;
  }).join(''):`<div style="color:var(--muted);font-size:13px;padding:10px;">중량 기록이 쌓이면 여기에 표시됩니다.</div>`;
}

// ═══════════════════════════════
// 네비 & 토스트
// ═══════════════════════════════
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  event.target.classList.add('active');
  if(id==='calendar') renderCalendar();
  if(id==='log') renderLog();
  if(id==='stats') renderStats();
}
let tTimer=null;
function showToast(msg,type='info'){ const t=document.getElementById('toast'); t.textContent=msg; t.className=`toast ${type} show`; if(tTimer) clearTimeout(tTimer); tTimer=setTimeout(()=>t.classList.remove('show'),3500); }

// ═══════════════════════════════
// 초기화
// ═══════════════════════════════
window.onload=()=>{
  loadRecs(); loadRT();
  // 항상 오늘 요일로 초기화
  selDay=new Date().getDay();
  initSetData(DAY_SCHED[selDay]);
  initToday();
  // 1분마다 날짜 체크 (자정 지나면 자동 갱신)
  setInterval(()=>{
    const newDay=new Date().getDay();
    if(newDay!==selDay){ selDay=newDay; initSetData(DAY_SCHED[selDay]); initToday(); }
  }, 60000);
  const chk=setInterval(()=>{ if(typeof google!=='undefined'&&google.accounts){ clearInterval(chk); initGoogle(); } },500);
};
</script>
